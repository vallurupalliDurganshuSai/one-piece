<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Explore iconic One Piece story arcs and discover the legendary characters from Romance Dawn to Wano." />
  <title>One Piece — Character Arcs</title>

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/loading.css" />
  <link rel="stylesheet" href="css/cards.css" />

  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

  <style>
    /* Entrance animation for arc cards */
    .arc-card {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity .5s ease, transform .5s ease,
                  box-shadow .3s ease, border-color .3s ease;
    }
    .arc-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="loading-screen" class="loading-screen">
    <div class="loading-logo">
      <img src="images/logo.png" alt="One Piece" />
    </div>
    <p class="loading-tagline">Set Sail for the Grand Adventure</p>
    <div class="loading-bar"></div>
  </div>

  <nav class="navbar">
    <div class="navbar__spacer"></div>
    <a href="index.html" class="navbar__logo">
      <img src="images/logo.png" alt="One Piece" />
    </a>
    <a href="#" class="navbar__vit">
      <img src="images/vit-logo.png" alt="VIT-AP University" />
    </a>
  </nav>

  <main class="content">
    <h1 class="section-title">Choose Your Arc</h1>
    <p class="section-subtitle">Select a saga to explore its legendary characters</p>
    <div class="gold-divider"></div>

    <div id="db-stats" style="display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; font-size: 0.85rem; font-weight: 600; letter-spacing: 1.5px; margin-bottom: 2rem; opacity: 0; transition: opacity 1s ease;">
      <div style="background: rgba(74, 155, 217, 0.1); border: 1px solid rgba(74, 155, 217, 0.3); padding: 8px 16px; border-radius: 20px; color: var(--blue);">
        🟢 AURA DB ONLINE
      </div>
      <div style="background: rgba(212, 168, 75, 0.1); border: 1px solid rgba(212, 168, 75, 0.3); padding: 8px 16px; border-radius: 20px; color: var(--straw);">
        <span id="node-count" style="color: white;">0</span> NODES
      </div>
      <div style="background: rgba(192, 57, 43, 0.1); border: 1px solid rgba(192, 57, 43, 0.3); padding: 8px 16px; border-radius: 20px; color: var(--crimson-light);">
        <span id="rel-count" style="color: white;">0</span> LINKS
      </div>
    </div>

    <div style="text-align: center; margin-bottom: 2.5rem;">
      <button id="toggle-view-btn" style="padding: 12px 28px; background: linear-gradient(135deg, var(--blue-dim), var(--navy)); color: var(--white); border: 1px solid var(--blue); border-radius: 30px; cursor: pointer; font-family: 'Cinzel', serif; font-weight: 700; letter-spacing: 1.5px; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(74, 155, 217, 0.3); transition: all 0.3s ease;">
        👁️ VIEW KNOWLEDGE GRAPH
      </button>
    </div>

    <div id="graph-container" style="display: none; width: 100%; height: 75vh; background: radial-gradient(circle at center, rgba(20, 34, 64, 0.8) 0%, rgba(8, 14, 26, 0.95) 100%); border: 1px solid rgba(74, 155, 217, 0.3); border-radius: 20px; margin-bottom: 3rem; box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); overflow: hidden;"></div>

    <div id="arc-grid" class="arc-grid"></div>

    <footer class="site-footer">
      <div class="footer-content">
        <img src="images/logo.png" alt="One Piece" class="footer-logo" />
        <p class="footer-tagline">Exploring the Grand Line, one arc at a time with Anshu.</p>
        <div class="footer-divider"></div>
        <p class="footer-credits">Made with ❤️ at <strong>VIT-AP University</strong></p>
        <p class="footer-copy">&copy; 2026 One Piece Explorer. All rights reserved.</p>
      </div>
    </footer>
  </main>

  <script src="js/app.js"></script>
  <script src="js/loading.js"></script>
</body>
</html>
