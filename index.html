<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Explore iconic One Piece story arcs and discover the legendary characters from Romance Dawn to Wano." />
  <title>One Piece — Character Arcs</title>

  <div id="db-stats" style="text-align: center; color: #4a9bd9; font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 1rem; opacity: 0;">
    🟢 LIVE AURA DB: <span id="node-count">0</span> Nodes | <span id="rel-count">0</span> Relationships
  </div>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/loading.css" />
  <link rel="stylesheet" href="css/cards.css" />

  <style>
    /* Entrance animation for arc cards */
    .arc-card {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity .5s ease, transform .5s ease,
                  box-shadow .3s ease, border-color .3s ease;
    }
    .arc-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>
  <!-- ==================== LOADING SCREEN ==================== -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-logo">
      <img src="images/logo.png" alt="One Piece" />
    </div>
    <p class="loading-tagline">Set Sail for the Grand Adventure</p>
    <div class="loading-bar"></div>
  </div>

  <!-- ==================== NAVBAR ==================== -->
  <nav class="navbar">
    <div class="navbar__spacer"></div>
    <a href="index.html" class="navbar__logo">
      <img src="images/logo.png" alt="One Piece" />
    </a>
    <a href="#" class="navbar__vit">
      <img src="images/vit-logo.png" alt="VIT-AP University" />
    </a>
  </nav>

  <!-- ==================== CONTENT ==================== -->
  <main class="content">
    <h1 class="section-title">Choose Your Arc</h1>
    <p class="section-subtitle">Select a saga to explore its legendary characters</p>
    <div class="gold-divider"></div>
    <div style="text-align: center; margin-bottom: 2rem;">
  <button id="toggle-view-btn" style="padding: 10px 20px; background: var(--blue); color: white; border: none; border-radius: 8px; cursor: pointer; font-family: 'Cinzel', serif; font-weight: bold; letter-spacing: 1px;">
    👁️ View Neo4j Knowledge Graph
  </button>
</div>

<div id="graph-container" style="display: none; width: 100%; height: 600px; background: rgba(10, 20, 36, 0.95); border: 1px solid var(--blue); border-radius: 16px; margin-bottom: 2rem;"></div>
    <div id="arc-grid" class="arc-grid"></div>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="footer-content">
        <img src="images/logo.png" alt="One Piece" class="footer-logo" />
        <p class="footer-tagline">Exploring the Grand Line, one arc at a time with Anshu.</p>
        <div class="footer-divider"></div>
        <p class="footer-credits">Made with ❤️ at <strong>VIT-AP University</strong></p>
        <p class="footer-copy">&copy; 2026 One Piece Explorer. All rights reserved.</p>
      </div>
    </footer>
  </main>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/loading.js"></script>
</body>
</html>
